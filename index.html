<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网页</title>
    <style>
        /* 这里是 CSS，负责美化 */
        body {
            background-color: #f0f2f5; 
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
            width: 500px;
            margin: 20px;
        }
        h1 { 
            color: #1a73e8; 
            margin-top: 0;
            font-size: 24px;
        }
        p {
            color: #5f6368;
            line-height: 1.6;
        }
        .btn-container {
            margin: 20px 0;
        }
        button {
            padding: 12px 24px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:active {
            transform: scale(0.95);
        }
        /* 图片展示区域 */
        .image-box {
            margin-top: 25px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f8f9fa;
            border: 1px dashed #ccc;
            line-height: 0;
        }
        .preview-img {
            width: 100%;       
            height: auto;      
            display: block;
            transition: opacity 0.3s;
        }
        /* 图片没出来时的提示文字 */
        .img-tip {
            padding: 20px;
            font-size: 14px;
            color: #999;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>你好，欢迎来到我的网页</h1>
        <p>这是我亲手制作并发布在 GitHub 上的第一个个人站点。</p>
        
        <div class="btn-container">
            <button onclick="changeColor()">换个心情</button>
        </div>

        <div class="image-box">
            <!-- 检查点：确保仓库 images 文件夹下直接就是 photo1.jpg 文件 -->
            <img src="image/photo_1.jpg" alt="加载中..." class="preview-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="img-tip" style="display:none;">
                📷 图片暂时无法显示<br>
                请检查仓库中 images 文件夹下是否有 photo1.jpg
            </div>
        </div>
    </div>

    <script>
        function changeColor() {
            const colors = ['#f0f2f5', '#e3f2fd', '#f1f8e9', '#fff3e0', '#fce4ec'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundImage = 'none';
            document.body.style.backgroundColor = randomColor;
        }
    </script>
</body>
</html>
